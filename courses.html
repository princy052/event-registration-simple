<!DOCTYPE html>
<html>
<head>
<title>My Events</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#f4f7fb;}
nav{background:#0d1b2a;color:white;padding:15px;display:flex;justify-content:space-between;}
nav a{color:white;margin:10px;text-decoration:none;}

.hero{
background:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') center/cover;
color:white;
padding:60px;
text-align:center;
}

.grid{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:30px;
justify-content:center;
}

.card{
background:white;
width:260px;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{width:100%;height:150px;object-fit:cover;}
.card h3{padding:10px;}
</style>
</head>

<body onload="load()">

<nav>
<div>EduPortal</div>
<div>
<a href="dashboard.html">Home</a>
<a href="courses.html">Events</a>
<a href="profile.html">Profile</a>
<a href="contact.html">Contact</a>
<a href="#" onclick="logout()">Logout</a>
</div>
</nav>

<div class="hero">
<h1>Your Events 🎟</h1>
</div>

<div class="grid" id="list"></div>

<script>
function logout(){localStorage.removeItem("currentUser");location="index.html";}

let u=JSON.parse(localStorage.getItem(localStorage.getItem("currentUser")));

function load(){
let html="";
u.events.forEach((e,i)=>{
html+=`
<div class="card">
<img src="${e.image}">
<h3>${e.name}</h3>
<button onclick="remove(${i})">Remove</button>
</div>`;
});
list.innerHTML=html||"<h3>No events joined</h3>";
}

function remove(i){
u.events.splice(i,1);
localStorage.setItem(localStorage.getItem("currentUser"),JSON.stringify(u));
load();
}
</script>

</body>
</html>
