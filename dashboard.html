<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{margin:0;font-family:'Segoe UI';background:#f4f7fb;}
nav{background:#0d1b2a;color:white;padding:15px;display:flex;justify-content:space-between;}
nav a{color:white;margin:10px;text-decoration:none;}

.hero{
background:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') center/cover;
color:white;
padding:70px;
text-align:center;
}

.grid{display:flex;flex-wrap:wrap;gap:20px;padding:30px;justify-content:center;}

.card{
background:white;
width:260px;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.card img{width:100%;height:160px;object-fit:cover;}

button{margin:10px;padding:10px;width:90%;background:#0077b6;color:white;border:none;}
</style>
</head>

<body>

<nav>
<div>EduPortal</div>
<div>
<a href="dashboard.html">Home</a>
<a href="courses.html">Events</a>
<a href="profile.html">Profile</a>
<a href="contact.html">Contact</a>
<a href="#" onclick="logout()">Logout</a>
</div>
</nav>

<div class="hero">
<h1>Explore Events </h1>
</div>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1677442136019-21780ecad995">
<h3>AI Workshop</h3>
<button onclick="enroll('AI Workshop','https://images.unsplash.com/photo-1677442136019-21780ecad995')">Join</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
<h3>Cloud Computing</h3>
<button onclick="enroll('Cloud Computing','https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">Join</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
<h3>Web Development</h3>
<button onclick="enroll('Web Development','https://images.unsplash.com/photo-1498050108023-c5249f4df085')">Join</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
<h3>Cyber Security</h3>
<button onclick="enroll('Cyber Security','https://images.unsplash.com/photo-1518770660439-4636190af475')">Join</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c">
<h3>Data Science</h3>
<button onclick="enroll('Data Science','https://images.unsplash.com/photo-1555949963-aa79dcee981c')">Join</button>
</div>

</div>

<script>
function logout(){localStorage.removeItem("currentUser");location="index.html";}

function enroll(name,img){
let u=JSON.parse(localStorage.getItem(localStorage.getItem("currentUser")));

if(!u.events.some(e=>e.name===name)){
u.events.push({name:name,image:img});
localStorage.setItem(localStorage.getItem("currentUser"),JSON.stringify(u));
alert("Joined!");
}
}
</script>

</body>
</html>
