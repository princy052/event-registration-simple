<!DOCTYPE html>
<html>
<head>
<title>EduPortal</title>

<style>
body{
margin:0;
font-family:'Segoe UI';

/* CLEAN TECH BACKGROUND */
background:url('https://images.unsplash.com/photo-1498050108023-c5249f4df085') no-repeat center/cover;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* DARK OVERLAY */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:0;
}

/* GLASS CARD */
.card{
position:relative;
z-index:1;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
padding:35px;
border-radius:20px;
width:320px;
text-align:center;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* INPUT */
input{
width:90%;
padding:12px;
margin:10px;
border:none;
border-bottom:2px solid white;
background:transparent;
color:white;
outline:none;
}

input::placeholder{color:#ddd;}

/* BUTTON */
button{
width:95%;
padding:12px;
background:#00b4d8;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* SWITCH TEXT */
.switch{
cursor:pointer;
color:#ccc;
}
.switch:hover{color:white;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>LOGIN</h2>
<input id="lemail" placeholder="Email">
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p class="switch" onclick="showRegister()">Create Account</p>
</div>

<!-- REGISTER -->
<div class="card" id="registerBox" style="display:none;">
<h2>REGISTER</h2>
<input id="rname" placeholder="Name">
<input id="remail" placeholder="Email">
<input id="rpass" type="password" placeholder="Password">
<button onclick="register()">Create Account</button>
<p class="switch" onclick="showLogin()">Already have account? Login</p>
</div>

<script>
function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function register(){
let user={
name:rname.value,
email:remail.value,
pass:rpass.value,
events:[]
};
localStorage.setItem(remail.value,JSON.stringify(user));
alert("Account created!");
showLogin();
}

function login(){
let user=JSON.parse(localStorage.getItem(lemail.value));
if(user && user.pass===lpass.value){
localStorage.setItem("currentUser",lemail.value);
window.location="dashboard.html";
}else{
alert("Invalid login!");
}
}
</script>

</body>
</html>
